<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 页码跳转 · 莫斯科谜题</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f0ebe4; color: #1e2a3a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app { max-width: 800px; width: 100%; background: #fff; border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.12); padding: 28px 30px 36px; }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .upload-area { background: #f8f5f0; border-radius: 16px; padding: 16px 20px; margin-bottom: 22px; display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
        .upload-area label { background: #d4c9b8; padding: 6px 18px; border-radius: 40px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.15s; }
        .upload-area label:hover { background: #cbbcb0; }
        .upload-area input[type="file"] { display: none; }
        .upload-area .status { font-size: 14px; color: #4a5a6a; }
        .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 22px; }
        .controls label { font-weight: 500; font-size: 15px; }
        .controls input[type="number"] { width: 70px; padding: 8px 12px; border-radius: 40px; border: 1px solid #d5cdc0; font-size: 15px; text-align: center; background: #fff; outline: none; }
        .controls input[type="number"]:focus { border-color: #8a7a66; box-shadow: 0 0 0 3px rgba(138,122,102,0.15); }
        .controls button { background: #1e2a3a; color: #fff; border: none; padding: 8px 24px; border-radius: 40px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.15s; }
        .controls button:hover { background: #2c3e4e; }
        .controls button.secondary { background: #e8e0d6; color: #1e2a3a; }
        .controls button.secondary:hover { background: #d5cdc0; }
        .info { font-size: 14px; color: #6b7b8b; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; }
        .pdf-container { background: #e8e0d6; border-radius: 16px; overflow: auto; position: relative; min-height: 500px; display: flex; justify-content: center; align-items: flex-start; padding: 10px; }
        .pdf-container canvas { max-width: 100%; height: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.12); background: #fff; border-radius: 4px; }
        .pdf-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 18px; color: #4a5a6a; }
        .footer { margin-top: 18px; font-size: 13px; color: #9a8a7a; text-align: center; }
        @media (max-width: 600px) { .app { padding: 16px; } .controls { flex-direction: column; align-items: stretch; } .controls input[type="number"] { width: 100%; } }
    </style>
</head>
<body>
<div class="app">
    <h1>📖 莫斯科谜题 · 页码跳转</h1>

    <div class="upload-area">
        <label for="pdfUpload">📤 上传 PDF</label>
        <input type="file" id="pdfUpload" accept=".pdf">
        <span class="status" id="pdfStatus">自动加载中…</span>
    </div>

    <div class="controls">
        <label for="puzzleId">题号：</label>
        <input type="number" id="puzzleId" min="1" max="359" value="1">
        <button id="jumpBtn">跳转</button>
        <button id="todayBtn" class="secondary">📅 今日一题</button>
        <button id="randomBtn" class="secondary">🎲 随机</button>
    </div>

    <div class="info">
        <span id="pageInfo">当前页码：--</span>
        <span id="totalInfo">共 359 题</span>
    </div>

    <div class="pdf-container" id="pdfContainer">
        <div class="pdf-loading" id="pdfLoading">等待加载PDF…</div>
        <canvas id="pdfCanvas"></canvas>
    </div>

    <div class="footer">所有页码已内置 · 点击跳转自动定位</div>
</div>

<script>

// ============================================================
//  应用逻辑
// ============================================================
const total = 359;
let pdfDoc = null;
let currentId = 1;

const pdfStatus = document.getElementById('pdfStatus');
const puzzleIdInput = document.getElementById('puzzleId');
const jumpBtn = document.getElementById('jumpBtn');
const todayBtn = document.getElementById('todayBtn');
const randomBtn = document.getElementById('randomBtn');
const pageInfo = document.getElementById('pageInfo');
const pdfLoading = document.getElementById('pdfLoading');
const canvas = document.getElementById('pdfCanvas');
const pdfUpload = document.getElementById('pdfUpload');

// 加载PDF（从URL或从File对象）
function loadPDF(source) {
    const loadingPromise = (source instanceof File) 
        ? pdfjsLib.getDocument({ data: source }).promise
        : pdfjsLib.getDocument(source).promise;
    
    pdfLoading.textContent = '⏳ 加载PDF中…';
    pdfStatus.textContent = '⏳ 加载中…';
    loadingPromise.then(pdf => {
        pdfDoc = pdf;
        pdfStatus.textContent = `✅ 已加载 (${pdf.numPages}页)`;
        // 自动跳转到当前题号
        jumpTo(currentId);
    }).catch(err => {
        pdfStatus.textContent = '❌ 加载失败';
        pdfLoading.textContent = '❌ 加载失败，请检查文件是否存在或使用上传功能';
        console.error(err);
    });
}

// 自动加载同目录PDF（固定文件名）
function autoLoadFromFile() {
    const url = 'feismo.com-the-moscow-puzzles-359-mathematical-puzzlespdf-pr_bd738f9a90e1cfa8d9f5d4284c2d20df.pdf';
    loadPDF(url);
}

// 上传事件
pdfUpload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    loadPDF(file);
});

// 跳转到指定题号
function jumpTo(id) {
    const page = PAGE_MAP[id];
    if (!page) {
        alert(`题号 ${id} 无对应页码`);
        return;
    }
    if (!pdfDoc) {
        alert('请先加载PDF文件（自动加载或手动上传）');
        return;
    }
    currentId = id;
    puzzleIdInput.value = id;
    pageInfo.textContent = `当前页码：${page}`;
    renderPage(page);
}

// 渲染页面
function renderPage(pageNum) {
    pdfLoading.style.display = 'block';
    pdfLoading.textContent = '⏳ 渲染页面…';
    pdfDoc.getPage(pageNum).then(page => {
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise.then(() => {
            pdfLoading.style.display = 'none';
        });
    }).catch(err => {
        pdfLoading.textContent = '❌ 渲染失败';
        console.error(err);
    });
}

// 今日一题（从2025-01-01起循环）
function getTodayId() {
    const now = new Date();
    const start = new Date(2025, 0, 1);
    const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
    return ((diff % total) + total) % total + 1;
}

// 随机一题
function getRandomId() {
    return Math.floor(Math.random() * total) + 1;
}

// 按钮事件
jumpBtn.addEventListener('click', function() {
    const id = parseInt(puzzleIdInput.value, 10);
    if (isNaN(id) || id < 1 || id > total) {
        alert(`请输入 1 ~ ${total} 之间的题号`);
        return;
    }
    jumpTo(id);
});

todayBtn.addEventListener('click', function() {
    jumpTo(getTodayId());
});

randomBtn.addEventListener('click', function() {
    jumpTo(getRandomId());
});

// 键盘回车
puzzleIdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') jumpBtn.click();
});

// 初始化：自动加载同目录PDF
pdfStatus.textContent = '⏳ 自动加载同目录PDF…';
autoLoadFromFile();
</script>
</body>
</html>
